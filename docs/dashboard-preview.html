<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forge — pipeline</title>
<style>
:root{color-scheme:light;--bg:#0b0f14;--grid:#141b24;--ink:#e6edf3;--mut:#8b949e;--line:#2a3340;
--ok:#3fb950;--warn:#d29922;--bad:#f85149;--acc:#58a6ff}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font:14px/1.45 ui-sans-serif,system-ui,Segoe UI,Roboto,Arial;overflow:hidden}
header{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;gap:12px;
padding:0 16px;background:rgba(13,17,23,.9);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);z-index:20}
header h1{font-size:16px;margin:0;letter-spacing:.5px}header h1 b{color:var(--acc)}
.badge{padding:2px 9px;border:1px solid var(--line);border-radius:20px;font-size:12px;color:var(--mut)}
.badge.on{color:var(--ok);border-color:var(--ok)}
.ctrl{display:none;align-items:center;gap:6px}
.btn{cursor:pointer;border:1px solid var(--line);background:#0f1620;color:var(--ink);border-radius:8px;padding:5px 11px;font-size:14px;font-weight:700}
.btn:hover{border-color:var(--acc)}.btn.play{color:var(--ok)}.btn:disabled{opacity:.4;cursor:default}
.stepn{font-size:12px;color:var(--mut);min-width:74px;text-align:center}
a.tg{margin-left:auto;color:var(--mut);text-decoration:none;font-size:12px;border:1px solid var(--line);padding:4px 10px;border-radius:6px}
.stage{position:absolute;inset:88px 0 0 0;overflow:auto}.stage.insp-on{right:360px}
.canvas{position:relative;width:1520px;height:660px;margin:18px auto;
background-image:radial-gradient(var(--grid) 1px,transparent 1px);background-size:22px 22px}
svg.edges{position:absolute;left:0;top:0;width:1520px;height:660px;pointer-events:none}
.node{position:absolute;width:166px;border:1px solid var(--line);border-top:3px solid var(--mut);border-radius:12px;
background:#0f1620;box-shadow:0 6px 18px rgba(0,0,0,.35);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s}
.node:hover{transform:translateY(-2px)}
.node.active{box-shadow:0 0 0 1px var(--acc),0 6px 22px rgba(88,166,255,.22)}
.node.cur{box-shadow:0 0 0 2px var(--warn),0 0 26px rgba(210,153,34,.5);transform:scale(1.04);z-index:5}
.node .hd{display:flex;align-items:center;gap:7px;padding:7px 9px;font-weight:700;font-size:12.5px;border-bottom:1px solid var(--line)}
.node .ic{width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#0b0f14;font-weight:800}
.node .inst{margin-left:auto;font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;background:#0b0f14;border:1px solid var(--line);color:var(--mut)}
.node .inst.run{color:#0b0f14}
.node .bd{padding:7px 9px;font-size:11.5px;color:var(--mut)}
.node .big{font-size:20px;font-weight:800;color:var(--ink)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:4px}.dot.dead{background:var(--mut)}
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.chip{font-size:9.5px;padding:1px 5px;border:1px solid var(--line);border-radius:10px;color:var(--mut)}
.chip.hot{color:#0b0f14;font-weight:700}
.port{position:absolute;width:9px;height:9px;border-radius:50%;background:#0f1620;border:2px solid var(--mut);top:50%;transform:translateY(-50%)}
.port.in{left:-5px}.port.out{right:-5px}
.insp{position:fixed;top:88px;right:0;bottom:0;width:360px;border-left:1px solid var(--line);background:#0d1117;padding:14px;overflow:auto;display:none}
.insp h2{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);margin:0 0 6px}
.insp .ttl{font-size:15px;font-weight:800;margin:2px 0}.insp .sum{color:var(--mut);font-size:12px;margin-bottom:10px}
.data{background:#0b0f14;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:11.5px}
.leg{font-size:11px;color:var(--mut);margin:7px 0 2px}.mono{font-family:ui-monospace,Menlo,monospace}
.sink{color:var(--bad)}.okv{color:var(--ok)}.badv{color:var(--bad)}
.row{padding:5px 7px;border:1px solid var(--line);border-radius:6px;margin:5px 0;background:#0f1620}
pre{white-space:pre-wrap;word-break:break-word;margin:4px 0;font-size:11px;color:#c9d1d9}
.slog{margin-top:14px}.slog .it{font-size:11px;color:var(--mut);padding:2px 0;border-bottom:1px solid #161b22}.slog .it.cur{color:var(--warn);font-weight:700}
.sev-critical{border-left:3px solid var(--bad)}.sev-high{border-left:3px solid var(--warn)}.sev-medium{border-left:3px solid var(--acc)}.sev-low{border-left:3px solid var(--mut)}
/* modal détail agent */
.ov{position:fixed;inset:0;background:rgba(2,6,12,.6);display:none;align-items:center;justify-content:center;z-index:40}
.modal{width:560px;max-width:92vw;max-height:86vh;overflow:auto;background:#0f1620;border:1px solid var(--line);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal .mh{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
.modal .mh .ic{width:26px;height:26px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;color:#0b0f14;font-weight:800}
.modal .mh h3{margin:0;font-size:17px}.modal .mh .x{margin-left:auto;cursor:pointer;color:var(--mut);font-size:18px;border:1px solid var(--line);border-radius:6px;padding:0 9px}
.modal .mb{padding:14px 16px}.modal .desc{color:var(--mut);font-size:13px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.card{background:#0b0f14;border:1px solid var(--line);border-radius:10px;padding:10px}
.card h4{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut)}
.tok{display:flex;gap:12px;flex-wrap:wrap}.tok b{font-size:18px}
.taglist span{display:inline-block;font-size:11px;border:1px solid var(--line);border-radius:8px;padding:2px 7px;margin:2px 3px 0 0;color:var(--ink)}
.hint{font-size:11px;color:var(--mut);margin-top:4px}
/* barre d'onglets + panneaux déroulants */
.pulls{position:fixed;top:52px;left:0;right:0;height:34px;display:flex;gap:8px;align-items:center;padding:0 16px;
background:rgba(13,17,23,.85);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);z-index:18}
.pull{cursor:pointer;font-size:12px;color:var(--mut);border:1px solid var(--line);border-radius:7px;padding:3px 10px;background:#0f1620}
.pull:hover{color:var(--ink)}.pull.on{color:#0b0f14;background:var(--acc);border-color:var(--acc);font-weight:700}
.panel{position:fixed;top:86px;left:0;right:0;max-height:46vh;overflow:auto;z-index:17;display:none;
background:#0d1117;border-bottom:1px solid var(--line);box-shadow:0 14px 30px rgba(0,0,0,.4);padding:14px 18px}
.panel h3{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--mut)}
.bars .bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px}
.bars .bar i{height:9px;border-radius:5px;display:inline-block}
.fleetgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.fcard{background:#0f1620;border:1px solid var(--line);border-radius:10px;padding:9px}
.fcard .h{font-weight:700;font-size:12px;margin-bottom:5px}.inst-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin:2px}
.filerow{cursor:pointer;font-family:ui-monospace,Menlo,monospace;font-size:12px;padding:3px 6px;border-radius:6px}
.filerow:hover{background:#161b22}.filerow.on{background:#161b22;color:var(--acc)}
.code{background:#0b0f14;border:1px solid var(--line);border-radius:8px;padding:0;overflow:auto;max-height:38vh}
.code table{border-collapse:collapse;width:100%;font-family:ui-monospace,Menlo,monospace;font-size:11.5px}
.code td{padding:0 8px;white-space:pre}.code .ln{color:#566;text-align:right;user-select:none;border-right:1px solid var(--line);background:#0d1117}
.code tr.hot{background:rgba(248,81,73,.14)}.code tr.hot .ln{color:var(--bad)}
.verdbar{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.vd{font-size:9.5px;padding:1px 6px;border-radius:9px;border:1px solid var(--line)}
.vd.tp{color:#0b0f14;background:var(--ok)}.vd.fp{color:var(--mut)}.vd.na{color:var(--mut)}.vd.nr{color:var(--warn);border-color:var(--warn)}
.frow{cursor:pointer}.frow:hover{outline:1px solid var(--acc)}
.expl{font-size:12px;color:#c9d1d9;line-height:1.5}
.funnel{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fstage{background:#0f1620;border:1px solid var(--line);border-radius:10px;padding:8px 16px;text-align:center;min-width:86px}
.fstage .fn{font-size:24px;font-weight:800}.fstage .fl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.farrow{color:var(--mut);font-size:14px;text-align:center;padding:0 2px}.farrow .fd{font-size:9.5px;color:var(--bad)}

ol": "SECRET_KEY", "note": "exposition/primitive d\u00e9pr\u00e9ci\u00e9e"}}}, {"fp": "dfe1c6335524bb533ee7dd17", "file": "profile.py", "symbol": "load_preferences", "cwe": "CWE-502", "vuln_class": "CWE-502", "state": "published", "verdict": "true-positive", "exploited": true, "severity": "critical", "technique": "rule:cg-web-deser-001", "title": "Untrusted data deserialized with pickle", "description": "R\u00e8gle cg-web-deser-001 d\u00e9clench\u00e9e (motif: pickle\\.loads?\\().", "owasp": "A08", "source": "def load_preferences(cookie_value):\n    \"\"\"V9 \u2014 D\u00e9s\u00e9rialisation non s\u00fbre : le cookie de pr\u00e9f\u00e9rences est d\u00e9pickl\u00e9 (CWE-502).\n\n    Exploitable par un cookie pickle forg\u00e9 -> ex\u00e9cution de code.\n    \"\"\"\n    raw = base64.b64decode(cookie_value)\n    return pickle.loads(raw)  # <-- sink d\u00e9s\u00e9rialisation non s\u00fbre", "line_start": 33, "rule_id": "cg-web-deser-001", "remediation": "## Rule \u2014 Never deserialize untrusted input with pickle\n\n`pickle.loads` on attacker-controlled bytes executes arbitrary code during deserialization.\n\n**Vulnerable**: `pickle.loads(base64.b64decode(cookie))`\n**Safe**: use a data-only format (JSON); if objects are required, sign and verify payloads.\n\nDetection: `pickle.loads` / unsafe `yaml.load`. Sink: the deserializer. Impact: remote code\nexecution.\n", "evidence": {"reachability": {"file": "profile.py", "symbol": "load_preferences", "note": "fonction atteignable depuis un point d'entr\u00e9e HTTP"}, "trust_boundary": {"file": "profile.py", "symbol": "load_preferences", "note": "entr\u00e9e non fiable utilis\u00e9e sans validation"}, "impact": {"file": "profile.py", "symbol": "load_preferences", "note": "sink CWE-502 atteint dans cette fonction"}}}, {"fp": "9b00dab4256095150ddc1a39", "file": "profile.py", "symbol": "read_avatar", "cwe": "CWE-22", "vuln_class": "CWE-22", "state": "published", "verdict": "true-positive", "exploited": true, "severity": "high", "technique": "rule:cg-web-path-001", "title": "Filesystem path built from untrusted filename without normalization", "description": "R\u00e8gle cg-web-path-001 d\u00e9clench\u00e9e (motif: open\\(\\s*path\\b).", "owasp": "A01", "source": "def read_avatar(filename):\n    \"\"\"V6 \u2014 Path traversal : `filename` est concat\u00e9n\u00e9 au chemin sans assainissement (CWE-22).\n\n    Exploitable par filename = \"../../../../etc/passwd\".\n    \"\"\"\n    path = os.path.join(AVATAR_DIR, filename)  # <-- pas de normalisation/validation\n    with open(path, \"rb\") as f:                # <-- sink lecture FS\n        return f.read()", "line_start": 23, "rule_id": "cg-web-path-001", "remediation": "## Rule \u2014 Confine file access to a safe base directory\n\nJoining an unsanitized filename to a base directory allows `../` traversal to read arbitrary\nfiles.\n\n**Vulnerable**: `open(os.path.join(BASE, filename), \"rb\")` with user `filename`.\n**Safe**: resolve the path and verify it stays within BASE (`os.path.realpath` + prefix check).\n\nDetection: `open(path)` where `path` derives from `os.path.join` with user input. Sink: the\nfile read. Impact: disclosure of arbitrary files (config, secrets, `/etc/passwd`).\n", "evidence": {"reachability": {"file": "profile.py", "symbol": "read_avatar", "note": "fonction atteignable depuis un point d'entr\u00e9e HTTP"}, "trust_boundary": {"file": "profile.py", "symbol": "read_avatar", "note": "entr\u00e9e non fiable utilis\u00e9e sans validation"}, "impact": {"file": "profile.py", "symbol": "read_avatar", "note": "sink CWE-22 atteint dans cette fonction"}}}, {"fp": "d7245d6565055c1068dea362", "file": "products.py", "symbol": "render_search", "cwe": "CWE-79", "vuln_class": "CWE-79", "state": "published", "verdict": "true-positive", "exploited": true, "severity": "medium", "technique": "rule:cg-web-xss-001", "title": "HTML response built by concatenating unescaped user input", "description": "R\u00e8gle cg-web-xss-001 d\u00e9clench\u00e9e (motif: (?s)<(html|body|h1|h2|div|li|p|span|table)\\b.*?\\+\\s*\\w+).", "owasp": "A03", "source": "def render_search(term):\n    \"\"\"V2 \u2014 XSS : `term` est interpol\u00e9 tel quel dans le HTML (CWE-79).\n\n    Exploitable par term = \"<script>alert(1)<\/script>\".\n    \"\"\"\n    results = db.search_products(term)  # passe aussi par le SQLi (V1 bis)\n    rows = \"\".join(f\"<li>{r['name']} \u2014 {r['price']} \u20ac<\/li>\" for r in results)\n    html = (\n        \"<html><body><h1>R\u00e9sultats pour : \" + term + \"<\/h1>\"  # <-- sink XSS (non \u00e9chapp\u00e9)\n        \"<ul>\" + rows + \"<\/ul><\/body><\/html>\"\n    )\n    return html", "line_start": 18, "rule_id": "cg-web-xss-001", "remediation": "## Rule \u2014 Escape output rendered into HTML\n\nUser-controlled values placed into an HTML response must be contextually escaped. Building\nmarkup by concatenating raw input enables reflected/stored XSS.\n\n**Vulnerable**: `\"<h1>Results for: \" + term + \"<\/h1>\"`\n**Safe**: use a template engine with auto-escaping, or `html.escape(term)`.\n\nDetection: an HTML tag in a string assembled with `+ <var>`. Sink: the HTTP response body.\nImpact: arbitrary JavaScript execution in the victim's browser, session theft.\n", "evidence": {"reachability": {"file": "products.py", "symbol": "render_search", "note": "fonction atteignable depuis un point d'entr\u00e9e HTTP"}, "trust_boundary": {"file": "products.py", "symbol": "render_search", "note": "entr\u00e9e non fiable utilis\u00e9e sans validation"}, "impact": {"file": "products.py", "symbol": "render_search", "note": "sink CWE-79 atteint dans cette fonction"}}}, {"fp": "d1b7f8019e5cadab5de4036b", "file": "db.py", "symbol": "md5", "cwe": "CWE-327", "vuln_class": "CWE-327", "state": "published", "verdict": "true-positive", "exploited": false, "severity": "medium", "technique": "rule:cg-crypto-weakhash-001", "title": "Deprecated hash primitive (MD5/SHA1) used for a security purpose", "description": "R\u00e8gle cg-crypto-weakhash-001 d\u00e9clench\u00e9e (motif: hashlib\\.(md5|sha1)\\().", "owasp": "A02", "source": "    def md5(s): return hashlib.md5(s.encode()).hexdigest()", "line_start": 33, "rule_id": "cg-crypto-weakhash-001", "remediation": "## Rule \u2014 Use strong, purpose-appropriate hashing\n\nMD5 and SHA-1 are broken for security uses. For passwords use a slow, salted KDF\n(bcrypt/scrypt/Argon2). \"Presence is the vulnerability\" (gate carve-out FR-087a).\n\n**Vulnerable**: `hashlib.md5(password.encode()).hexdigest()`\n**Safe**: `argon2.hash(password)` or `bcrypt.hashpw(...)`.\n\nDetection: `hashlib.md5`/`sha1`. Impact depends on use (password cracking, collision forgery).\n", "evidence": {"reachability": {"file": "db.py", "symbol": "md5", "note": "inclus au build"}, "trust_boundary": {"note": "le d\u00e9p\u00f4t source lui-m\u00eame (FR-087a)"}, "impact": {"file": "db.py", "symbol": "md5", "note": "exposition/primitive d\u00e9pr\u00e9ci\u00e9e"}}}, {"fp": "ada68f71d0476230255d187f", "file": "db.py", "symbol": "md5", "cwe": "CWE-916", "vuln_class": "CWE-916", "state": "published", "verdict": "true-positive", "exploited": false, "severity": "high", "technique": "rule:acme-crypto-pwhash-007", "title": "Password stored with fast unsalted hash (MD5/SHA-1/SHA-256) instead of a KDF", "description": "R\u00e8gle acme-crypto-pwhash-007 d\u00e9clench\u00e9e (motif: hashlib\\.(md5|sha1|sha256)\\().", "owasp": "A02", "source": "    def md5(s): return hashlib.md5(s.encode()).hexdigest()", "line_start": 33, "rule_id": "acme-crypto-pwhash-007", "remediation": "## Rule (ACME Crypto Labs corpus) \u2014 Passwords require a memory-hard KDF\n\n> Corpus tiers sp\u00e9cialis\u00e9 \u00ab crypto \u00bb, f\u00e9d\u00e9r\u00e9 dans Forge pour d\u00e9montrer ADR-002 :\n> des entit\u00e9s plus expertes maintiennent des r\u00e8gles de pointe par domaine.\n\nA general-purpose hash (even SHA-256) is unsuitable for passwords: it is fast and therefore\ncheap to brute-force. Passwords MUST use a memory-hard, salted KDF with a tuned cost factor:\n**Argon2id** (preferred), scrypt, or bcrypt. Unsalted hashes additionally enable rainbow-table\nand identical-password correlation attacks.\n\n**Vulnerable**: `hashlib.md5(password.encode()).hexdigest()` \u2014 no salt, no work factor.\n**Safe**: `argon2.PasswordHasher().hash(password)`.\n\nThis rule is more specific than the generic `cg-crypto-weakhash-001`: it is scoped to the\n*password* context and raises severity accordingly. In `vector` mode, it should out-rank the\ngeneric rule when scoring a function that hashes a password.\n", "evidence": {"reachability": {"file": "db.py", "symbol": "md5", "note": "inclus au build"}, "trust_boundary": {"note": "le d\u00e9p\u00f4t source lui-m\u00eame (FR-087a)"}, "impact": {"file": "db.py", "symbol": "md5", "note": "exposition/primitive d\u00e9pr\u00e9ci\u00e9e"}}}, {"fp": "e3e32c11446a0844a91de7e3", "file": "db.py", "symbol": "search_products", "cwe": "CWE-89", "vuln_class": "CWE-89", "state": "published", "verdict": "true-positive", "exploited": true, "severity": "high", "technique": "rule:cg-web-sqli-001", "title": "SQL query built by string concatenation of untrusted input", "description": "R\u00e8gle cg-web-sqli-001 d\u00e9clench\u00e9e (motif: (?s)(SELECT|INSERT|UPDATE|DELETE)\\b.*?\\+\\s*\\w+\\s*\\+).", "owasp": "A03", "source": "def search_products(term):\n    \"\"\"V1 (bis) \u2014 SQLi dans la recherche produit, \u00e9galement par concat\u00e9nation.\"\"\"\n    conn = get_conn()\n    query = \"SELECT id, name, price FROM products WHERE name LIKE '%\" + term + \"%'\"\n    rows = conn.execute(query).fetchall()  # <-- sink SQLi\n    conn.close()\n    return [dict(r) for r in rows]", "line_start": 65, "rule_id": "cg-web-sqli-001", "remediation": "## Rule \u2014 Parameterize all SQL\n\nUntrusted input must never be concatenated into a SQL string. Use parameterized\nqueries (placeholders + a values tuple) so the driver, not string building, separates\ncode from data.\n\n**Vulnerable**: `conn.execute(\"SELECT * FROM users WHERE name='\" + name + \"'\")`\n**Safe**: `conn.execute(\"SELECT * FROM users WHERE name = ?\", (name,))`\n\nDetection: a SQL keyword whose statement is assembled with `+ <var> +`. The sink is the\n`execute()` call; the trust boundary is the point where the request parameter enters the\nstring. Impact: authentication bypass, data exfiltration, data modification.\n", "evidence": {"reachability": {"file": "db.py", "symbol": "search_products", "note": "fonction atteignable depuis un point d'entr\u00e9e HTTP"}, "trust_boundary": {"file": "db.py", "symbol": "search_products", "note": "entr\u00e9e non fiable utilis\u00e9e sans validation"}, "impact": {"file": "db.py", "symbol": "search_products", "note": "sink CWE-89 atteint dans cette fonction"}}}, {"fp": "c9849985328198a6b41499b7", "file": "db.py", "symbol": "authenticate", "cwe": "CWE-89", "vuln_class": "CWE-89", "state": "published", "verdict": "true-positive", "exploited": true, "severity": "high", "technique": "rule:cg-web-sqli-001", "title": "SQL query built by string concatenation of untrusted input", "description": "R\u00e8gle cg-web-sqli-001 d\u00e9clench\u00e9e (motif: (?s)(SELECT|INSERT|UPDATE|DELETE)\\b.*?\\+\\s*\\w+\\s*\\+).", "owasp": "A03", "source": "def authenticate(username, password_md5):\n    \"\"\"V1 \u2014 SQLi : la requ\u00eate de login est construite par concat\u00e9nation de cha\u00eenes.\n\n    Exploitable par `username = \"admin' --\"` ou `' OR '1'='1`.\n    \"\"\"\n    conn = get_conn()\n    query = (\n        \"SELECT id, username, role FROM users \"\n        \"WHERE username = '\" + username + \"' AND password_md5 = '\" + password_md5 + \"'\"\n    )\n    row = conn.execute(query).fetchone()  # <-- sink SQLi\n    conn.close()\n    return dict(row) if row else None", "line_start": 50, "rule_id": "cg-web-sqli-001", "remediation": "## Rule \u2014 Parameterize all SQL\n\nUntrusted input must never be concatenated into a SQL string. Use parameterized\nqueries (placeholders + a values tuple) so the driver, not string building, separates\ncode from data.\n\n**Vulnerable**: `conn.execute(\"SELECT * FROM users WHERE name='\" + name + \"'\")`\n**Safe**: `conn.execute(\"SELECT * FROM users WHERE name = ?\", (name,))`\n\nDetection: a SQL keyword whose statement is assembled with `+ <var> +`. The sink is the\n`execute()` call; the trust boundary is the point where the request parameter enters the\nstring. Impact: authentication bypass, data exfiltration, data modification.\n", "evidence": {"reachability": {"file": "db.py", "symbol": "authenticate", "note": "fonction atteignable depuis un point d'entr\u00e9e HTTP"}, "trust_boundary": {"file": "db.py", "symbol": "authenticate", "note": "entr\u00e9e non fiable utilis\u00e9e sans validation"}, "impact": {"file": "db.py", "symbol": "authenticate", "note": "sink CWE-89 atteint dans cette fonction"}}}, {"fp": "ddf846507b9a6cb62fb4331c", "file": "app.py", "symbol": "suspected_timing_side_channel", "cwe": "CWE-208", "vuln_class": "CWE-208", "state": "verdict_assigned", "verdict": "needs-review", "exploited": false, "severity": "medium", "technique": "exploratory", "title": "Canal auxiliaire temporel suspect\u00e9 (non prouv\u00e9)", "description": "\u00c9cart de temps possible \u00e0 l'authentification ; non localis\u00e9 dans une fonction pr\u00e9cise, donc inv\u00e9rifiable en l'\u00e9tat.", "owasp": "A02", "source": "", "line_start": 0, "rule_id": null, "remediation": "", "evidence": {"reachability": {"file": "app.py", "symbol": "suspected_timing_side_channel", "note": "fonction atteignable depuis un point d'entr\u00e9e HTTP"}, "trust_boundary": {"file": "app.py", "symbol": "suspected_timing_side_channel", "note": "entr\u00e9e non fiable utilis\u00e9e sans validation"}, "impact": {"file": "app.py", "symbol": "suspected_timing_side_channel", "note": "sink CWE-208 atteint dans cette fonction"}}}, {"fp": "17676b7ceb09bb6aa60da60b", "file": "db.py", "symbol": "init_db", "cwe": "CWE-327", "vuln_class": "CWE-327", "state": "published", "verdict": "true-positive", "exploited": false, "severity": "medium", "technique": "rule:cg-crypto-weakhash-001", "title": "Deprecated hash primitive (MD5/SHA1) used for a security purpose", "description": "R\u00e8gle cg-crypto-weakhash-001 d\u00e9clench\u00e9e (motif: hashlib\\.(md5|sha1)\\().", "owasp": "A02", "source": "def init_db():\n    \"\"\"(R\u00e9)initialise une base de d\u00e9mo avec quelques utilisateurs et produits.\"\"\"\n    conn = get_conn()\n    c = conn.cursor()\n    c.executescript(\n        \"\"\"\n        DROP TABLE IF EXISTS users;\n        DROP TABLE IF EXISTS products;\n        CREATE TABLE users(id INTEGER PRIMARY KEY, username TEXT, password_md5 TEXT,\n                           email TEXT, role TEXT, ssn TEXT);\n        CREATE TABLE products(id INTEGER PRIMARY KEY, name TEXT, price REAL, secret_note TEXT);\n        \"\"\"\n    )\n    # password_md5 = md5(\"password\") etc. (V8 \u2014 crypto faible)\n    import hashlib\n    def md5(s): return hashlib.md5(s.encode()).hexdigest()\n    users = [\n        (1, \"alice\", md5(\"alicepw\"), \"alice@example.com\", \"user\", \"111-22-3333\"),\n        (2, \"bob\", md5(\"bobpw\"), \"bob@example.com\", \"user\", \"444-55-6666\"),\n        (3, \"admin\", md5(\"admin123\"), \"admin@example.com\", \"admin\", \"999-00-0000\"),\n    ]\n    c.executemany(\"INSERT INTO users VALUES(?,?,?,?,?,?)\", users)\n    products = [\n        (1, \"Widget\", 9.99, \"supplier-cost=2.10\"),\n        (2, \"Gadget\", 19.99, \"supplier-cost=5.00\"),\n        (3, \"Gizmo\", 4.99, \"discontinued-internal\"),\n    ]\n    c.executemany(\"INSERT INTO products VALUES(?,?,?,?)\", products)\n    conn.commit()\n    conn.close()", "line_start": 18, "rule_id": "cg-crypto-weakhash-001", "remediation": "## Rule \u2014 Use strong, purpose-appropriate hashing\n\nMD5 and SHA-1 are broken for security uses. For passwords use a slow, salted KDF\n(bcrypt/scrypt/Argon2). \"Presence is the vulnerability\" (gate carve-out FR-087a).\n\n**Vulnerable**: `hashlib.md5(password.encode()).hexdigest()`\n**Safe**: `argon2.hash(password)` or `bcrypt.hashpw(...)`.\n\nDetection: `hashlib.md5`/`sha1`. Impact depends on use (password cracking, collision forgery).\n", "evidence": {"reachability": {"file": "db.py", "symbol": "init_db", "note": "inclus au build"}, "trust_boundary": {"note": "le d\u00e9p\u00f4t source lui-m\u00eame (FR-087a)"}, "impact": {"file": "db.py", "symbol": "init_db", "note": "exposition/primitive d\u00e9pr\u00e9ci\u00e9e"}}}, {"fp": "39d9e217868b401defa4479f", "file": "db.py", "symbol": "init_db", "cwe": "CWE-916", "vuln_class": "CWE-916", "state": "published", "verdict": "true-positive", "exploited": false, "severity": "high", "technique": "rule:acme-crypto-pwhash-007", "title": "Password stored with fast unsalted hash (MD5/SHA-1/SHA-256) instead of a KDF", "description": "R\u00e8gle acme-crypto-pwhash-007 d\u00e9clench\u00e9e (motif: hashlib\\.(md5|sha1|sha256)\\().", "owasp": "A02", "source": "def init_db():\n    \"\"\"(R\u00e9)initialise une base de d\u00e9mo avec quelques utilisateurs et produits.\"\"\"\n    conn = get_conn()\n    c = conn.cursor()\n    c.executescript(\n        \"\"\"\n        DROP TABLE IF EXISTS users;\n        DROP TABLE IF EXISTS products;\n        CREATE TABLE users(id INTEGER PRIMARY KEY, username TEXT, password_md5 TEXT,\n                           email TEXT, role TEXT, ssn TEXT);\n        CREATE TABLE products(id INTEGER PRIMARY KEY, name TEXT, price REAL, secret_note TEXT);\n        \"\"\"\n    )\n    # password_md5 = md5(\"password\") etc. (V8 \u2014 crypto faible)\n    import hashlib\n    def md5(s): return hashlib.md5(s.encode()).hexdigest()\n    users = [\n        (1, \"alice\", md5(\"alicepw\"), \"alice@example.com\", \"user\", \"111-22-3333\"),\n        (2, \"bob\", md5(\"bobpw\"), \"bob@example.com\", \"user\", \"444-55-6666\"),\n        (3, \"admin\", md5(\"admin123\"), \"admin@example.com\", \"admin\", \"999-00-0000\"),\n    ]\n    c.executemany(\"INSERT INTO users VALUES(?,?,?,?,?,?)\", users)\n    products = [\n        (1, \"Widget\", 9.99, \"supplier-cost=2.10\"),\n        (2, \"Gadget\", 19.99, \"supplier-cost=5.00\"),\n        (3, \"Gizmo\", 4.99, \"discontinued-internal\"),\n    ]\n    c.executemany(\"INSERT INTO products VALUES(?,?,?,?)\", products)\n    conn.commit()\n    conn.close()", "line_start": 18, "rule_id": "acme-crypto-pwhash-007", "remediation": "## Rule (ACME Crypto Labs corpus) \u2014 Passwords require a memory-hard KDF\n\n> Corpus tiers sp\u00e9cialis\u00e9 \u00ab crypto \u00bb, f\u00e9d\u00e9r\u00e9 dans Forge pour d\u00e9montrer ADR-002 :\n> des entit\u00e9s plus expertes maintiennent des r\u00e8gles de pointe par domaine.\n\nA general-purpose hash (even SHA-256) is unsuitable for passwords: it is fast and therefore\ncheap to brute-force. Passwords MUST use a memory-hard, salted KDF with a tuned cost factor:\n**Argon2id** (preferred), scrypt, or bcrypt. Unsalted hashes additionally enable rainbow-table\nand identical-password correlation attacks.\n\n**Vulnerable**: `hashlib.md5(password.encode()).hexdigest()` \u2014 no salt, no work factor.\n**Safe**: `argon2.PasswordHasher().hash(password)`.\n\nThis rule is more specific than the generic `cg-crypto-weakhash-001`: it is scoped to the\n*password* context and raises severity accordingly. In `vector` mode, it should out-rank the\ngeneric rule when scoring a function that hashes a password.\n", "evidence": {"reachability": {"file": "db.py", "symbol": "init_db", "note": "inclus au build"}, "trust_boundary": {"note": "le d\u00e9p\u00f4t source lui-m\u00eame (FR-087a)"}, "impact": {"file": "db.py", "symbol": "init_db", "note": "exposition/primitive d\u00e9pr\u00e9ci\u00e9e"}}}, {"fp": "681cd0d053ef52da97702c6d", "file": "auth.py", "symbol": "hash_password", "cwe": "CWE-327", "vuln_class": "CWE-327", "state": "published", "verdict": "true-positive", "exploited": false, "severity": "medium", "technique": "rule:cg-crypto-weakhash-001", "title": "Deprecated hash primitive (MD5/SHA1) used for a security purpose", "description": "R\u00e8gle cg-crypto-weakhash-001 d\u00e9clench\u00e9e (motif: hashlib\\.(md5|sha1)\\().", "owasp": "A02", "source": "def hash_password(password):\n    \"\"\"V8 \u2014 MD5 non sal\u00e9 pour les mots de passe (CWE-327).\"\"\"\n    return hashlib.md5(password.encode()).hexdigest()  # <-- primitive d\u00e9pr\u00e9ci\u00e9e", "line_start": 10, "rule_id": "cg-crypto-weakhash-001", "remediation": "## Rule \u2014 Use strong, purpose-appropriate hashing\n\nMD5 and SHA-1 are broken for security uses. For passwords use a slow, salted KDF\n(bcrypt/scrypt/Argon2). \"Presence is the vulnerability\" (gate carve-out FR-087a).\n\n**Vulnerable**: `hashlib.md5(password.encode()).hexdigest()`\n**Safe**: `argon2.hash(password)` or `bcrypt.hashpw(...)`.\n\nDetection: `hashlib.md5`/`sha1`. Impact depends on use (password cracking, collision forgery).\n", "evidence": {"reachability": {"file": "auth.py", "symbol": "hash_password", "note": "inclus au build"}, "trust_boundary": {"note": "le d\u00e9p\u00f4t source lui-m\u00eame (FR-087a)"}, "impact": {"file": "auth.py", "symbol": "hash_password", "note": "exposition/primitive d\u00e9pr\u00e9ci\u00e9e"}}}, {"fp": "772768f053838ef2f87e4d47", "file": "auth.py", "symbol": "hash_password", "cwe": "CWE-916", "vuln_class": "CWE-916", "state": "published", "verdict": "true-positive", "exploited": false, "severity": "high", "technique": "rule:acme-crypto-pwhash-007", "title": "Password stored with fast unsalted hash (MD5/SHA-1/SHA-256) instead of a KDF", "description": "R\u00e8gle acme-crypto-pwhash-007 d\u00e9clench\u00e9e (motif: hashlib\\.(md5|sha1|sha256)\\().", "owasp": "A02", "source": "def hash_password(password):\n    \"\"\"V8 \u2014 MD5 non sal\u00e9 pour les mots de passe (CWE-327).\"\"\"\n    return hashlib.md5(password.encode()).hexdigest()  # <-- primitive d\u00e9pr\u00e9ci\u00e9e", "line_start": 10, "rule_id": "acme-crypto-pwhash-007", "remediation": "## Rule (ACME Crypto Labs corpus) \u2014 Passwords require a memory-hard KDF\n\n> Corpus tiers sp\u00e9cialis\u00e9 \u00ab crypto \u00bb, f\u00e9d\u00e9r\u00e9 dans Forge pour d\u00e9montrer ADR-002 :\n> des entit\u00e9s plus expertes maintiennent des r\u00e8gles de pointe par domaine.\n\nA general-purpose hash (even SHA-256) is unsuitable for passwords: it is fast and therefore\ncheap to brute-force. Passwords MUST use a memory-hard, salted KDF with a tuned cost factor:\n**Argon2id** (preferred), scrypt, or bcrypt. Unsalted hashes additionally enable rainbow-table\nand identical-password correlation attacks.\n\n**Vulnerable**: `hashlib.md5(password.encode()).hexdigest()` \u2014 no salt, no work factor.\n**Safe**: `argon2.PasswordHasher().hash(password)`.\n\nThis rule is more specific than the generic `cg-crypto-weakhash-001`: it is scoped to the\n*password* context and raises severity accordingly. In `vector` mode, it should out-rank the\ngeneric rule when scoring a function that hashes a password.\n", "evidence": {"reachability": {"file": "auth.py", "symbol": "hash_password", "note": "inclus au build"}, "trust_boundary": {"note": "le d\u00e9p\u00f4t source lui-m\u00eame (FR-087a)"}, "impact": {"file": "auth.py", "symbol": "hash_password", "note": "exposition/primitive d\u00e9pr\u00e9ci\u00e9e"}}}, {"fp": "7dd3037b00044e8e65b30d7d", "file": "admin.py", "symbol": "diagnostic_ping", "cwe": "CWE-78", "vuln_class": "CWE-78", "state": "published", "verdict": "true-positive", "exploited": true, "severity": "critical", "technique": "rule:cg-web-cmdi-001", "title": "OS command built from untrusted input with shell=True", "description": "R\u00e8gle cg-web-cmdi-001 d\u00e9clench\u00e9e (motif: shell\\s*=\\s*True).", "owasp": "A03", "source": "def diagnostic_ping(host):\n    \"\"\"V3 \u2014 Injection de commande : `host` est concat\u00e9n\u00e9 dans une commande shell (CWE-78).\n\n    Exploitable par host = \"127.0.0.1; id\" ou \"127.0.0.1 && echo PWNED\".\n    \"\"\"\n    cmd = \"ping -c 1 \" + host                       # <-- construction de commande non s\u00fbre\n    out = subprocess.run(cmd, shell=True, capture_output=True, text=True)  # <-- sink shell=True\n    return out.stdout + out.stderr", "line_start": 9, "rule_id": "cg-web-cmdi-001", "remediation": "## Rule \u2014 Never pass untrusted input to a shell\n\nBuilding a shell command by concatenation and running it with `shell=True` allows command\ninjection. Pass an argument list and avoid the shell.\n\n**Vulnerable**: `subprocess.run(\"ping -c1 \" + host, shell=True)`\n**Safe**: `subprocess.run([\"ping\", \"-c1\", host])` (no shell), with input validation.\n\nDetection: `shell=True`, or `os.system`/`os.popen` with concatenation. Sink: the shell.\nImpact: remote code execution on the host.\n", "evidence": {"reachability": {"file": "admin.py", "symbol": "diagnostic_ping", "note": "fonction atteignable depuis un point d'entr\u00e9e HTTP"}, "trust_boundary": {"file": "admin.py", "symbol": "diagnostic_ping", "note": "entr\u00e9e non fiable utilis\u00e9e sans validation"}, "impact": {"file": "admin.py", "symbol": "diagnostic_ping", "note": "sink CWE-78 atteint dans cette fonction"}}}, {"fp": "9dfcbf5171d6567c78501ab8", "file": "products.py", "symbol": "render_search_safe", "cwe": "CWE-79", "vuln_class": "CWE-79", "state": "verdict_assigned", "verdict": "false-positive", "exploited": false, "severity": "medium", "technique": "rule:cg-web-xss-001", "title": "HTML response built by concatenating unescaped user input", "description": "R\u00e8gle cg-web-xss-001 d\u00e9clench\u00e9e (motif: (?s)<(html|body|h1|h2|div|li|p|span|table)\\b.*?\\+\\s*\\w+).", "owasp": "A03", "source": "def render_search_safe(term):\n    \"\"\"Variante CORRECTE : la sortie est \u00e9chapp\u00e9e. Une r\u00e8gle XSS la signale (motif large),\n    mais le Triager doit la classer FAUX-POSITIF car la fronti\u00e8re est gard\u00e9e (html.escape).\n    \"\"\"\n    escaped = html.escape(term)\n    return \"<div>R\u00e9sultats pour : \" + escaped + \"<\/div>\"  # valid\u00e9 -> non exploitable", "line_start": 10, "rule_id": "cg-web-xss-001", "remediation": "## Rule \u2014 Escape output rendered into HTML\n\nUser-controlled values placed into an HTML response must be contextually escaped. Building\nmarkup by concatenating raw input enables reflected/stored XSS.\n\n**Vulnerable**: `\"<h1>Results for: \" + term + \"<\/h1>\"`\n**Safe**: use a template engine with auto-escaping, or `html.escape(term)`.\n\nDetection: an HTML tag in a string assembled with `+ <var>`. Sink: the HTTP response body.\nImpact: arbitrary JavaScript execution in the victim's browser, session theft.\n", "evidence": {"reason": {"file": "products.py", "symbol": "render_search_safe", "note": "entr\u00e9e assainie avant le sink (validateurs: escape) ; non exploitable"}}}, {"fp": "397a87402142dd274e7f3a4e", "file": "examples.py", "symbol": "example_unsafe_query_DO_NOT_USE", "cwe": "CWE-89", "vuln_class": "CWE-89", "state": "verdict_assigned", "verdict": "not-applicable", "exploited": false, "severity": "high", "technique": "rule:cg-web-sqli-001", "title": "SQL query built by string concatenation of untrusted input", "description": "R\u00e8gle cg-web-sqli-001 d\u00e9clench\u00e9e (motif: (?s)(SELECT|INSERT|UPDATE|DELETE)\\b.*?\\+\\s*\\w+\\s*\\+).", "owasp": "A03", "source": "def example_unsafe_query_DO_NOT_USE(name):\n    \"\"\"Exemple p\u00e9dagogique d'anti-pattern SQL \u2014 jamais ex\u00e9cut\u00e9 en production.\"\"\"\n    # Ressemble \u00e0 V1 (concat\u00e9nation SQL) mais c'est un \u00e9chantillon de doc, hors scope.\n    query = \"SELECT * FROM users WHERE name = '\" + name + \"' AND active = 1\"\n    return query  # retourne juste la cha\u00eene ; aucun sink r\u00e9el, aucune route", "line_start": 9, "rule_id": "cg-web-sqli-001", "remediation": "## Rule \u2014 Parameterize all SQL\n\nUntrusted input must never be concatenated into a SQL string. Use parameterized\nqueries (placeholders + a values tuple) so the driver, not string building, separates\ncode from data.\n\n**Vulnerable**: `conn.execute(\"SELECT * FROM users WHERE name='\" + name + \"'\")`\n**Safe**: `conn.execute(\"SELECT * FROM users WHERE name = ?\", (name,))`\n\nDetection: a SQL keyword whose statement is assembled with `+ <var> +`. The sink is the\n`execute()` call; the trust boundary is the point where the request parameter enters the\nstring. Impact: authentication bypass, data exfiltration, data modification.\n", "evidence": {"reason": {"note": "code d'exemple, hors p\u00e9rim\u00e8tre d'\u00e9valuation"}}}, {"fp": "5ad07ac80b6d17428d75481c", "file": "buffer.py", "symbol": "copy_into_fixed_buffer", "cwe": "CWE-120", "vuln_class": "CWE-120", "state": "verdict_assigned", "verdict": "false-positive", "exploited": false, "severity": "high", "technique": "rule:cg-mem-bufcopy-001", "title": "Copy into a fixed-size buffer without a bounds check", "description": "R\u00e8gle cg-mem-bufcopy-001 d\u00e9clench\u00e9e (motif: \\[\\s*\\d*\\s*:\\s*len\\().", "owasp": "A06", "source": "def copy_into_fixed_buffer(src):\n    \"\"\"Motif CWE-120 : copie dans un buffer fixe sans v\u00e9rifier len(src) <= 128.\"\"\"\n    buf = bytearray(128)\n    buf[0:len(src)] = src              # <-- aucune v\u00e9rification de taille (sink CWE-120)\n    return buf", "line_start": 13, "rule_id": "cg-mem-bufcopy-001", "remediation": "## Rule \u2014 Bound every copy into a fixed-size buffer\n\nCopying an input into a fixed-size buffer without verifying that the input fits is a classic\noverflow pattern (CWE-120 / CWE-787). The length must be checked against the buffer size.\n\n**Vulnerable**: `buf = bytearray(128); buf[0:len(src)] = src`  (no check that `len(src) <= 128`)\n**Safe**: `if len(src) > 128: raise ValueError(); buf[0:len(src)] = src`\n\nDetection note: this pattern is **breadth-first**. Whether it is *exploitable* depends on the\ncall context \u2014 if every caller bounds the input below the buffer size, the finding is not\nexploitable and Triage should clear it. That call-graph reasoning is exactly the Triager's job;\nthe Detector only flags the shape.\n", "evidence": {"reason": {"file": "buffer.py", "symbol": "copy_into_fixed_buffer", "note": "appelant(s) handle_fixed bornent l'entr\u00e9e (ex. [:64]) sous la taille du buffer (128) ; d\u00e9bordement impossible, non exploitable dans ce contexte d'appel"}}}], "coverage": [{"component": "admin.py", "state": "covered"}, {"component": "app.py", "state": "covered"}, {"component": "auth.py", "state": "covered"}, {"component": "buffer.py", "state": "covered"}, {"component": "db.py", "state": "covered"}, {"component": "examples.py", "state": "covered"}, {"component": "imageproxy.py", "state": "covered"}, {"component": "products.py", "state": "covered"}, {"component": "profile.py", "state": "covered"}], "tasks": {"closed": 66}, "flows": [{"entry": "login", "file": "auth.py", "chain": ["login", "hash_password", "\u2192sink:md5(CWE-327)"], "validated": false}, {"entry": "login", "file": "auth.py", "chain": ["login", "hash_password", "md5", "\u2192sink:md5(CWE-327)"], "validated": false}, {"entry": "login", "file": "auth.py", "chain": ["login", "authenticate", "\u2192sink:execute(CWE-89)"], "validated": false}, {"entry": "authenticate", "file": "db.py", "chain": ["authenticate", "\u2192sink:execute(CWE-89)"], "validated": false}, {"entry": "search_products", "file": "db.py", "chain": ["search_products", "\u2192sink:execute(CWE-89)"], "validated": false}, {"entry": "fetch_image", "file": "imageproxy.py", "chain": ["fetch_image", "\u2192sink:urlopen(CWE-918)"], "validated": false}, {"entry": "view_profile", "file": "profile.py", "chain": ["view_profile", "get_user", "\u2192sink:execute(CWE-89)"], "validated": false}, {"entry": "read_avatar", "file": "profile.py", "chain": ["read_avatar", "\u2192sink:open(CWE-22)"], "validated": false}, {"entry": "load_preferences", "file": "profile.py", "chain": ["lo st": 0.0}, "validator": {"alive": 0, "configured": 1, "calls": 8, "in_tok": 112, "out_tok": 80, "cost": 0.0}, "reporter": {"alive": 0, "configured": 1, "calls": 21, "in_tok": 357, "out_tok": 210, "cost": 0.0}, "detector": {"alive": 0, "configured": 3, "calls": 24, "in_tok": 2273, "out_tok": 247, "cost": 0.0}}, "verdicts": {"false-positive": 2, "needs-review": 1, "not-applicable": 1, "true-positive": 21}, "sources": {"auth.py": "\"\"\"Authentification VulnShop.\n\nContient V8 \u2014 Crypto faible (CWE-327) : mots de passe hach\u00e9s en MD5, sans sel.\n\"\"\"\nimport hashlib\n\nfrom . import db\n\n\ndef hash_password(password):\n    \"\"\"V8 \u2014 MD5 non sal\u00e9 pour les mots de passe (CWE-327).\"\"\"\n    return hashlib.md5(password.encode()).hexdigest()  # <-- primitive d\u00e9pr\u00e9ci\u00e9e\n\n\ndef login(username, password):\n    \"\"\"Authentifie via db.authenticate (qui est lui-m\u00eame vuln\u00e9rable au SQLi, V1).\"\"\"\n    pw_md5 = hash_password(password)\n    return db.authenticate(username, pw_md5)\n", "db.py": "\"\"\"Acc\u00e8s aux donn\u00e9es VulnShop (SQLite).\n\nContient V1 \u2014 Injection SQL (CWE-89) : requ\u00eates construites par concat\u00e9nation.\n\"\"\"\nimport os\nimport sqlite3\nimport tempfile\n\n_DB_PATH = os.path.join(tempfile.gettempdir(), \"vulnshop.db\")\n\n\ndef get_conn():\n    conn = sqlite3.connect(_DB_PATH)\n    conn.row_factory = sqlite3.Row\n    return conn\n\n\ndef init_db():\n    \"\"\"(R\u00e9)initialise une base de d\u00e9mo avec quelques utilisateurs et produits.\"\"\"\n    conn = get_conn()\n    c = conn.cursor()\n    c.executescript(\n        \"\"\"\n        DROP TABLE IF EXISTS users;\n        DROP TABLE IF EXISTS products;\n        CREATE TABLE users(id INTEGER PRIMARY KEY, username TEXT, password_md5 TEXT,\n                           email TEXT, role TEXT, ssn TEXT);\n        CREATE TABLE products(id INTEGER PRIMARY KEY, name TEXT, price REAL, secret_note TEXT);\n        \"\"\"\n    )\n    # password_md5 = md5(\"password\") etc. (V8 \u2014 crypto faible)\n    import hashlib\n    def md5(s): return hashlib.md5(s.encode()).hexdigest()\n    users = [\n        (1, \"alice\", md5(\"alicepw\"), \"alice@example.com\", \"user\", \"111-22-3333\"),\n        (2, \"bob\", md5(\"bobpw\"), \"bob@example.com\", \"user\", \"444-55-6666\"),\n        (3, \"admin\", md5(\"admin123\"), \"admin@example.com\", \"admin\", \"999-00-0000\"),\n    ]\n    c.executemany(\"INSERT INTO users VALUES(?,?,?,?,?,?)\", users)\n    products = [\n        (1, \"Widget\", 9.99, \"supplier-cost=2.10\"),\n        (2, \"Gadget\", 19.99, \"supplier-cost=5.00\"),\n        (3, \"Gizmo\", 4.99, \"discontinued-internal\"),\n    ]\n    c.executemany(\"INSERT INTO products VALUES(?,?,?,?)\", products)\n    conn.commit()\n    conn.close()\n\n\ndef authenticate(username, password_md5):\n    \"\"\"V1 \u2014 SQLi : la requ\u00eate de login est construite par concat\u00e9nation de cha\u00eenes.\n\n    Exploitable par `username = \"admin' --\"` ou `' OR '1'='1`.\n    \"\"\"\n    conn = get_conn()\n    query = (\n        \"SELECT id, username, role FROM users \"\n        \"WHERE username = '\" + username + \"' AND password_md5 = '\" + password_md5 + \"'\"\n    )\n    row = conn.execute(query).fetchone()  # <-- sink SQLi\n    conn.close()\n    return dict(row) if row else None\n\n\ndef search_products(term):\n    \"\"\"V1 (bis) \u2014 SQLi dans la recherche produit, \u00e9galement par concat\u00e9nation.\"\"\"\n    conn = get_conn()\n    query = \"SELECT id, name, price FROM products WHERE name LIKE '%\" + term + \"%'\"\n    rows = conn.execute(query).fetchall()  # <-- sink SQLi\n    conn.close()\n    return [dict(r) for r in rows]\n\n\ndef get_user(user_id):\n    \"\"\"Lecture d'un utilisateur par id (utilis\u00e9e par le profil \u2014 voir V5 IDOR).\"\"\"\n    conn = get_conn()\n    row = conn.execute(\"SELECT * FROM users WHERE id = ?\", (user_id,)).fetchone()\n    conn.close()\n    return dict(row) if row else None\n", "config.py": "\"\"\"Configuration de VulnShop.\n\nAVERTISSEMENT : application volontairement vuln\u00e9rable, \u00e0 des fins de d\u00e9monstration.\nNe jamais d\u00e9ployer hors d'un sandbox jetable.\n\"\"\"\n\n# V7 \u2014 Secret en dur dans la source (CWE-798). \"La pr\u00e9sence est la vuln\" (FR-087a).\nSECRET_KEY = \"sk_live_51H8xQ2eZvKYlo2C_HARDCODED_DO_NOT_SHIP\"\nADMIN_API_KEY = \"admin-9f3a-PLAINTEXT-KEY-1234\"\nDB_PASSWORD = \"p@ssw0rd-in-source\"\n\nHOST = \"127.0.0.1\"\nPORT = 8081\n", "imageproxy.py": "\"\"\"Proxy d'image VulnShop.\n\nContient V4 \u2014 SSRF (CWE-918) : r\u00e9cup\u00e8re une URL fournie par l'utilisateur sans validation.\n\"\"\"\nimport urllib.request\n\n\ndef fetch_image(url):\n    \"\"\"V4 \u2014 SSRF : `url` (contr\u00f4l\u00e9e par l'utilisateur) est requ\u00eat\u00e9e c\u00f4t\u00e9 serveur (CWE-918).\n\n    Exploitable par url = \"http://169.254.169.254/latest/meta-data/\" (m\u00e9tadonn\u00e9es cloud)\n    ou \"http://localhost:.../\" pour atteindre des services internes.\n    \"\"\"\n    with urllib.request.urlopen(url, timeout=3) as resp:  # <-- sink SSRF (aucune allowlist)\n        return resp.read()\n", "profile.py": "\"\"\"Profils utilisateurs VulnShop.\n\nContient :\n  V5 \u2014 IDOR / contr\u00f4le d'acc\u00e8s cass\u00e9 (CWE-639) : acc\u00e8s au profil par id, sans autorisation.\n  V6 \u2014 Path traversal (CWE-22) : lecture d'avatar par nom de fichier non assaini.\n  V9 \u2014 D\u00e9s\u00e9rialisation non s\u00fbre (CWE-502) : pr\u00e9f\u00e9rences charg\u00e9es via pickle.\n\"\"\"\nimport base64\nimport os\nimport pickle\n\nfrom . import db\n\nAVATAR_DIR = os.path.join(os.path.dirname(__file__), \"avatars\")\n\n\ndef view_profile(requested_id, session_user_id):\n    \"\"\"V5 \u2014 IDOR : retourne n'importe quel profil par id sans v\u00e9rifier session_user_id (CWE-639).\"\"\"\n    # Aucune v\u00e9rification que requested_id == session_user_id ni que l'appelant est admin.\n    return db.get_user(int(requested_id))  # <-- acc\u00e8s direct, non autoris\u00e9\n\n\ndef read_avatar(filename):\n    \"\"\"V6 \u2014 Path traversal : `filename` est concat\u00e9n\u00e9 au chemin sans assainissement (CWE-22).\n\n    Exploitable par filename = \"../../../../etc/passwd\".\n    \"\"\"\n    path = os.path.join(AVATAR_DIR, filename)  # <-- pas de normalisation/validation\n    with open(path, \"rb\") as f:                # <-- sink lecture FS\n        return f.read()\n\n\ndef load_preferences(cookie_value):\n    \"\"\"V9 \u2014 D\u00e9s\u00e9rialisation non s\u00fbre : le cookie de pr\u00e9f\u00e9rences est d\u00e9pickl\u00e9 (CWE-502).\n\n    Exploitable par un cookie pickle forg\u00e9 -> ex\u00e9cution de code.\n    \"\"\"\n    raw = base64.b64decode(cookie_value)\n    return pickle.loads(raw)  # <-- sink d\u00e9s\u00e9rialisation non s\u00fbre\n", "__init__.py": "\"\"\"VulnShop \u2014 application web volontairement vuln\u00e9rable (cible de d\u00e9monstration Forge).\n\nAVERTISSEMENT : ne jamais d\u00e9ployer hors d'un sandbox jetable. Toutes les vuln\u00e9rabilit\u00e9s\nsont sem\u00e9es d\u00e9lib\u00e9r\u00e9ment. Voir docs/vulnshop.md pour le catalogue (V1..V10).\n\"\"\"\n", "products.py": "\"\"\"Catalogue produit VulnShop.\n\nContient V2 \u2014 XSS r\u00e9fl\u00e9chi (CWE-79) : le terme de recherche est r\u00e9-affich\u00e9 sans \u00e9chappement.\n\"\"\"\nimport html\n\nfrom . import db\n\n\ndef render_search_safe(term):\n    \"\"\"Variante CORRECTE : la sortie est \u00e9chapp\u00e9e. Une r\u00e8gle XSS la signale (motif large),\n    mais le Triager doit la classer FAUX-POSITIF car la fronti\u00e8re est gard\u00e9e (html.escape).\n    \"\"\"\n    escaped = html.escape(term)\n    return \"<div>R\u00e9sultats pour : \" + escaped + \"<\/div>\"  # valid\u00e9 -> non exploitable\n\n\ndef render_search(term):\n    \"\"\"V2 \u2014 XSS : `term` est interpol\u00e9 tel quel dans le HTML (CWE-79).\n\n    Exploitable par term = \"<script>alert(1)<\/script>\".\n    \"\"\"\n    results = db.search_products(term)  # passe aussi par le SQLi (V1 bis)\n    rows = \"\".join(f\"<li>{r['name']} \u2014 {r['price']} \u20ac<\/li>\" for r in results)\n    html = (\n        \"<html><body><h1>R\u00e9sultats pour : \" + term + \"<\/h1>\"  # <-- sink XSS (non \u00e9chapp\u00e9)\n        \"<ul>\" + rows + \"<\/ul><\/body><\/html>\"\n    )\n    return html\n", "admin.py": "\"\"\"Fonctions d'administration VulnShop.\n\nContient V3 \u2014 Injection de commande (CWE-78) : un ping de diagnostic concat\u00e8ne l'entr\u00e9e\nutilisateur dans une commande shell.\n\"\"\"\nimport subprocess\n\n\ndef diagnostic_ping(host):\n    \"\"\"V3 \u2014 Injection de commande : `host` est concat\u00e9n\u00e9 dans une commande shell (CWE-78).\n\n    Exploitable par host = \"127.0.0.1; id\" ou \"127.0.0.1 && echo PWNED\".\n    \"\"\"\n    cmd = \"ping -c 1 \" + host                       # <-- construction de commande non s\u00fbre\n    out = subprocess.run(cmd, shell=True, capture_output=True, text=True)  # <-- sink shell=True\n    return out.stdout + out.stderr\n", "examples.py": "\"\"\"Extraits d'EXEMPLE / documentation \u2014 non d\u00e9ploy\u00e9s, hors p\u00e9rim\u00e8tre d'\u00e9valuation.\n\nContient volontairement du code qui ressemble \u00e0 une vuln\u00e9rabilit\u00e9, pour d\u00e9montrer que\nle Triager le classe `not-applicable` (code d'exemple, FR-055) plut\u00f4t que de polluer la\nsortie. Rien ici n'est branch\u00e9 \u00e0 une route.\n\"\"\"\n\n\ndef example_unsafe_query_DO_NOT_USE(name):\n    \"\"\"Exemple p\u00e9dagogique d'anti-pattern SQL \u2014 jamais ex\u00e9cut\u00e9 en production.\"\"\"\n    # Ressemble \u00e0 V1 (concat\u00e9nation SQL) mais c'est un \u00e9chantillon de doc, hors scope.\n    query = \"SELECT * FROM users WHERE name = '\" + name + \"' AND active = 1\"\n    return query  # retourne juste la cha\u00eene ; aucun sink r\u00e9el, aucune route\n", "buffer.py": "\"\"\"Copie en buffer de taille fixe \u2014 vuln r\u00e9elle mais NON exploitable dans son contexte.\n\n`copy_into_fixed_buffer` copie une entr\u00e9e dans un buffer fixe de 128 octets sans v\u00e9rifier\nla taille (motif CWE-120 : copie sans contr\u00f4le de borne). Prise isol\u00e9ment, c'est une\nvuln\u00e9rabilit\u00e9. Mais son **unique appelant** borne l'entr\u00e9e \u00e0 64 octets (< 128) : le buffer\nn'est jamais d\u00e9bord\u00e9. La vuln\u00e9rabilit\u00e9 existe dans l'absolu mais n'est pas exploitable ici.\n\nLe Triager doit le constater via le **graphe d'appels** et classer ce candidat\nFAUX-POSITIF (non exploitable en contexte) \u2014 il ne doit pas sortir en true-positive.\n\"\"\"\n\n\ndef copy_into_fixed_buffer(src):\n    \"\"\"Motif CWE-120 : copie dans un buffer fixe sans v\u00e9rifier len(src) <= 128.\"\"\"\n    buf = bytearray(128)\n    buf[0:len(src)] = src              # <-- aucune v\u00e9rification de taille (sink CWE-120)\n    return buf\n\n\ndef handle_fixed(token):\n    \"\"\"Unique appelant : borne l'entr\u00e9e \u00e0 64 octets, sous la taille du buffer (128).\"\"\"\n    safe = token[:64]                  # <-- l'appelant garantit len(safe) <= 64 < 128\n    return copy_into_fixed_buffer(safe)\n", "app.py": "\"\"\"Serveur HTTP VulnShop (stdlib) \u2014 le testbed que le Validator exploite en live.\n\nLancer seul :  python -m targets.vulnshop.app   (\u00e9coute sur 127.0.0.1:8081)\nRoutes expos\u00e9es (toutes vuln\u00e9rables, cf. docs/vulnshop.md) :\n  GET  /login?username=&password=     -> V1 SQLi (bypass d'auth)\n  GET  /search?q=                      -> V2 XSS r\u00e9fl\u00e9chi (+ V1bis SQLi)\n  GET  /profile?id=                    -> V5 IDOR\n  GET  /avatar?file=                   -> V6 Path traversal\n  GET  /admin/ping?host=               -> V3 Injection de commande\n  GET  /imageproxy?url=                -> V4 SSRF\n  GET  /prefs?c=                       -> V9 D\u00e9s\u00e9rialisation non s\u00fbre\n\"\"\"\nimport json\nimport os\nimport threading\nimport urllib.parse\nfrom http.server import BaseHTTPRequestHandler, ThreadingHTTPServer\n\nfrom . import admin, config, db, imageproxy, products, profile\n\n\nclass Handler(BaseHTTPRequestHandler):\n    def log_message(self, *args):\n        pass  # silencieux\n\n    def _send(self, code, body, ctype=\"text/html; charset=utf-8\"):\n        if isinstance(body, str):\n            body = body.encode()\n        self.send_response(code)\n        self.send_header(\"Content-Type\", ctype)\n        self.send_header(\"Content-Length\", str(len(body)))\n        self.end_headers()\n        self.wfile.write(body)\n\n    def do_GET(self):\n        parsed = urllib.parse.urlparse(self.path)\n        q = urllib.parse.parse_qs(parsed.query)\n        g = lambda k, d=\"\": q.get(k, [d])[0]\n        try:\n            if parsed.path == \"/\" or parsed.path == \"/health\":\n                return self._send(200, json.dumps({\"app\": \"vulnshop\", \"status\": \"ok\"}),\n                                  \"application/json\")\n            if parsed.path == \"/login\":\n                user = db.authenticate(g(\"username\"), g(\"password\"))  # V1\n                if user:\n                    return self._send(200, json.dumps({\"ok\": True, \"user\": user}),\n                                      \"application/json\")\n                return self._send(401, json.dumps({\"ok\": False}), \"application/json\")\n            if parsed.path == \"/search\":\n                return self._send(200, products.render_search(g(\"q\")))  # V2 (+V1bis)\n            if parsed.path == \"/profile\":\n                data = profile.view_profile(g(\"id\", \"1\"), session_user_id=1)  # V5 IDOR\n                return self._send(200, json.dumps(data), \"application/json\")\n            if parsed.path == \"/avatar\":\n                return self._send(200, profile.read_avatar(g(\"file\")),  # V6\n                                  \"application/octet-stream\")\n            if parsed.path == \"/admin/ping\":\n                return self._send(200, admin.diagnostic_ping(g(\"host\", \"127.0.0.1\")),  # V3\n                                  \"text/plain\")\n            if parsed.path == \"/imageproxy\":\n                return self._send(200, imageproxy.fetch_image(g(\"url\")),  # V4\n                                  \"application/octet-stream\")\n            if parsed.path == \"/prefs\":\n                prefs = profile.load_preferences(g(\"c\"))  # V9\n                return self._send(200, json.dumps({\"prefs\": str(prefs)}), \"application/json\")\n            return self._send(404, json.dumps({\"error\": \"not found\"}), \"application/json\")\n        except Exception as e:  # noqa: BLE001 \u2014 un testbed qui ne crash pas\n            return self._send(500, json.dumps({\"error\": str(e)}), \"application/json\")\n\n\ndef make_server(host=None, port=None):\n    db.init_db()\n    os.makedirs(profile.AVATAR_DIR, exist_ok=True)\n    # un avatar de d\u00e9mo pour la lecture l\u00e9gitime\n    with open(os.path.join(profile.AVATAR_DIR, \"alice.png\"), \"wb\") as f:\n        f.write(b\"\\x89PNG\\r\\n_demo_avatar_\")\n    # port == 0 -> \u00e9ph\u00e9m\u00e8re (ne pas confondre avec \"non fourni\")\n    bind_port = config.PORT if port is None else port\n    return ThreadingHTTPServer((host or config.HOST, bind_port), Handler)\n\n\ndef serve_in_thread(host=None, port=None):\n    \"\"\"D\u00e9marre le testbed dans un thread d\u00e9mon ; retourne (server, base_url).\"\"\"\n    srv = make_server(host, port)\n    t = threading.Thread(target=srv.serve_forever, daemon=True)\n    t.start()\n    h, p = srv.server_address\n    return srv, f\"http://{h}:{p}\"\n\n\nif __name__ == \"__main__\":\n    srv = make_server()\n    print(f\"VulnShop \u00e9coute sur http://{config.HOST}:{config.PORT}  (Ctrl-C pour arr\u00eater)\")\n    try:\n        srv.serve_forever()\n    except KeyboardInterrupt:\n        pass\n"}, "funnel": {"detected": 25, "true_positive": 21, "distinct": 18, "duplicates": 3, "exploited": 8, "false_positive": 2, "not_applicable": 1, "needs_review": 1}, "priority": [{"file": "profile.py", "symbol": "load_preferences", "cwes": ["CWE-502"], "rules": ["cg-web-deser-001"], "fps": ["dfe1c6335524bb533ee7dd17"], "exploited": true, "severity": "critical", "title": "Untrusted data deserialized with pickle", "dup": false}, {"file": "admin.py", "symbol": "diagnostic_ping", "cwes": ["CWE-78"], "rules": ["cg-web-cmdi-001"], "fps": ["7dd3037b00044e8e65b30d7d"], "exploited": true, "severity": "critical", "title": "OS command built from untrusted input with shell=True", "dup": false}, {"file": "profile.py", "symbol": "read_avatar", "cwes": ["CWE-22"], "rules": ["cg-web-path-001"], "fps": ["9b00dab4256095150ddc1a39"], "exploited": true, "severity": "high", "title": "Filesystem path built from untrusted filename without normalization", "dup": false}, {"file": "profile.py", "symbol": "view_profile", "cwes": ["CWE-639"], "rules": [], "fps": ["b642e201218cc03c2e000ecf"], "exploited": true, "severity": "high", "title": "R\u00e9f\u00e9rence directe \u00e0 un objet sans contr\u00f4le d'acc\u00e8s (IDOR)", "dup": false}, {"file": "db.py", "symbol": "search_products", "cwes": ["CWE-89"], "rules": ["cg-web-sqli-001"], "fps": ["e3e32c11446a0844a91de7e3"], "exploited": true, "severity": "high", "title": "SQL query built by string concatenation of untrusted input", "dup": false}, {"file": "db.py", "symbol": "authenticate", "cwes": ["CWE-89"], "rules": ["cg-web-sqli-001"], "fps": ["c9849985328198a6b41499b7"], "exploited": true, "severity": "high", "title": "SQL query built by string concatenation of untrusted input", "dup": false}, {"file": "imageproxy.py", "symbol": "fetch_image", "cwes": ["CWE-918"], "rules": ["cg-web-ssrf-001"], "fps": ["2502f4344c6550ff250f291d"], "exploited": true, "severity": "high", "title": "Server-side request to a user-controlled URL without allowlist", "dup": false}, {"file": "products.py", "symbol": "render_search", "cwes": ["CWE-79"], "rules": ["cg-web-xss-001"], "fps": ["d7245d6565055c1068dea362"], "exploited": true, "severity": "medium", "title": "HTML response built by concatenating unescaped user input", "dup": false}, {"file": "requirements.txt", "symbol": "PyYAML==3.13", "cwes": ["CWE-1035"], "rules": [], "fps": ["73b8442d65197742d70014e4"], "exploited": false, "severity": "critical", "title": "D\u00e9pendance vuln\u00e9rable : PyYAML 3.13 (CVE-2017-18342)", "dup": false}, {"file": "requirements.txt", "symbol": "Flask==0.12.2", "cwes": ["CWE-1035"], "rules": [], "fps": ["ec32d7f1369f41f774f3a9f0"], "exploited": false, "severity": "high", "title": "D\u00e9pendance vuln\u00e9rable : Flask 0.12.2 (CVE-2018-1000656)", "dup": false}, {"file": "db.py", "symbol": "md5", "cwes": ["CWE-327", "CWE-916"], "rules": ["acme-crypto-pwhash-007", "cg-crypto-weakhash-001"], "fps": ["d1b7f8019e5cadab5de4036b", "ada68f71d0476230255d187f"], "exploited": false, "severity": "high", "title": "Deprecated hash primitive (MD5/SHA1) used for a security purpose", "dup": true}, {"file": "db.py", "symbol": "init_db", "cwes": ["CWE-327", "CWE-916"], "rules": ["acme-crypto-pwhash-007", "cg-crypto-weakhash-001"], "fps": ["17676b7ceb09bb6aa60da60b", "39d9e217868b401defa4479f"], "exploited": false, "severity": "high", "title": "Deprecated hash primitive (MD5/SHA1) used for a security purpose", "dup": true}, {"file": "auth.py", "symbol": "hash_password", "cwes": ["CWE-327", "CWE-916"], "rules": ["acme-crypto-pwhash-007", "cg-crypto-weakhash-001"], "fps": ["681cd0d053ef52da97702c6d", "772768f053838ef2f87e4d47"], "exploited": false, "severity": "high", "title": "Deprecated hash primitive (MD5/SHA1) used for a security purpose", "dup": true}, {"file": "config.py", "symbol": "DB_PASSWORD", "cwes": ["CWE-798"], "rules": [], "fps": ["3eb011d1d251a23d55496a38"], "exploited": false, "severity": "high", "title": "Secret en dur (DB_PASSWORD)", "dup": false}, {"file": "config.py", "symbol": "ADMIN_API_KEY", "cwes": ["CWE-798"], "rules": [], "fps": ["46465a38edca6c743c620670"], "exploited": false, "severity": "high", "title": "Secret en dur (ADMIN_API_KEY)", "dup": false}, {"file": "config.py", "symbol": "SECRET_KEY", "cwes": ["CWE-798"], "rules": [], "fps": ["d46dafa10353a412f206342f"], "exploited": false, "severity": "high", "title": "Secret en dur (SECRET_KEY)", "dup": false}, {"file": "requirements.txt", "symbol": "Jinja2==2.10", "cwes": ["CWE-1035"], "rules": [], "fps": ["10cc92a9b566241838c7f082"], "exploited": false, "severity": "medium", "title": "D\u00e9pendance vuln\u00e9rable : Jinja2 2.10 (CVE-2020-28493)", "dup": false}, {"file": "requirements.txt", "symbol": "requests==2.19.1", "cwes": ["CWE-1035"], "rules": [], "fps": ["9e0a5daa57939773b01fa372"], "exploited": false, "severity": "medium", "title": "D\u00e9pendance vuln\u00e9rable : requests 2.19.1 (CVE-2018-18074)", "dup": false}], "mode": "live"};window.fetch=async(u,o)=>({json:async()=>window.__SNAP__});</script></head><body>
